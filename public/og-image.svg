<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(148,163,184,0.10)" stroke-width="1"/>
    </pattern>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(148,163,184,0.18)"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- IK monogram, centered + scaled -->
  <g transform="translate(360 175) scale(5)" fill="none" stroke="#38bdf8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14 12 L6 12 L6 52 L14 52"/>
    <line x1="28" y1="12" x2="28" y2="52"/>
    <line x1="50" y1="12" x2="50" y2="52"/>
    <line x1="50" y1="32" x2="66" y2="12"/>
    <line x1="50" y1="32" x2="66" y2="52"/>
    <path d="M82 12 L90 12 L90 52 L82 52"/>
    <circle cx="38" cy="32" r="2.4" fill="#38bdf8" stroke="none"/>
  </g>

  <!-- Wordmark + tagline -->
  <text x="600" y="540" font-family="Outfit, Inter, sans-serif" font-size="56" font-weight="600" fill="#f1f5f9" text-anchor="middle" letter-spacing="-1">
    ian<tspan fill="#38bdf8">.</tspan>kluhsman<tspan fill="#38bdf8">.</tspan>com
  </text>
  <text x="600" y="585" font-family="Inter, sans-serif" font-size="24" fill="#94a3b8" text-anchor="middle" letter-spacing="0.5">
    Developer in the Denver area · web · mobile · IT consulting
  </text>
</svg>
